<div class="edit-form">

    <div class="app-content flex-column-fluid">
        <div class="app-container container-fluid">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Update Profile</h3>
                </div>

                <div class="card-body">
                    <form method="post" action="./verProfile.aspx">
                        <div class="form-group row mb-4">
                            <label class="col-md-3 col-form-label fw-bold">Họ và Tên:</label>
                            <div class="col-md-9">
                                <input
                                    name="txtFullName"
                                    type="text"
                                    id="txtFullName"
                                    class="form-control"
                                    readonly
                                    required
                                    value="Đặng Hoàng Nguyên"
                                />
                            </div>
                        </div>

                        <div class="form-group row mb-4">
                            <label class="col-md-3 col-form-label fw-bold">Phone Number:</label>
                            <div class="col-md-9">
                                <input
                                    name="txtMobile"
                                    type="text"
                                    id="txtMobile"
                                    class="form-control"
                                    required
                                    value="0787691445"
                                />
                            </div>
                        </div>

                        <div class="form-group row mb-4">
                            <label class="col-md-3 col-form-label fw-bold">Ngày sinh:</label>
                            <div class="col-md-3">
                                <input
                                    name="txtDob"
                                    type="text"
                                    id="txtDob"
                                    class="form-control"
                                    required
                                    value="04/05/2003"
                                />
                            </div>
                            <label class="col-md-3 col-form-label fw-bold">Nơi sinh:</label>
                            <div class="col-md-3">
                                <input
                                    name="txtNoisinh"
                                    type="text"
                                    id="txtNoisinh"
                                    class="form-control"
                                    required
                                    value="Thành phố Hồ Chí Minh"
                                />
                            </div>
                        </div>

                        <div class="form-group row mb-4">
                            <label class="col-md-3 col-form-label fw-bold">Giới tính:</label>
                            <div class="col-md-9 radio-group">
                                <input id="rdNam" type="radio" name="m" value="rdNam" checked />
                                <label for="rdNam">Nam</label>
                                <input id="rdNu" type="radio" name="m" value="rdNu" />
                                <label for="rdNu">Nữ</label>
                            </div>
                        </div>

                        <div class="form-group row mb-4">
                            <label class="col-md-3 col-form-label fw-bold">CMT/CCCD:</label>
                            <div class="col-md-9">
                                <input
                                    name="txtCMT"
                                    type="text"
                                    id="txtCMT"
                                    class="form-control"
                                    required
                                    value="079203005622"
                                />
                            </div>
                        </div>

                        <div class="form-group row mb-4">
                            <label class="col-md-3 col-form-label fw-bold">Ngày cấp:</label>
                            <div class="col-md-3">
                                <input
                                    name="txtDateOfIssue"
                                    type="text"
                                    id="txtDateOfIssue"
                                    class="form-control"
                                    required
                                    value="09/11/2017"
                                />
                            </div>
                            <label class="col-md-3 col-form-label fw-bold">Nơi cấp:</label>
                            <div class="col-md-3">
                                <input
                                    name="txtNoicap"
                                    type="text"
                                    id="txtNoicap"
                                    class="form-control"
                                    required
                                    value="Cục cảnh sát quản lý hành chính về trật tự xã hội"
                                />
                            </div>
                        </div>

                        <!-- Address -->
                        <div class="form-group row mb-4">
                            <label class="col-md-3 col-form-label fw-bold">Địa chỉ:</label>
                            <div class="col-md-9">
                                <input
                                    name="txtDiachi"
                                    type="text"
                                    id="txtDiachi"
                                    class="form-control"
                                    required
                                    value="812/13 Trường Sa"
                                />
                            </div>
                        </div>

                        <!-- Submit Button -->
                        <div class="form-group row mb-4">
                            <div class="col-md-9 offset-md-3">
                                <button type="submit" name="btSubmit" class="btn btn-primary" onclick="return confirm('Do you want to update your profile?');">
                                    Save
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
